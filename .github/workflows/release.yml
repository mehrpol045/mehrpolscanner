name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-go:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            goos: windows
            goarch: amd64
            artifact: mehrpol-windows-amd64.exe
          - name: windows-arm64
            goos: windows
            goarch: arm64
            artifact: mehrpol-windows-arm64.exe
          - name: linux-amd64
            goos: linux
            goarch: amd64
            artifact: mehrpol-linux-amd64
          - name: linux-arm64
            goos: linux
            goarch: arm64
            artifact: mehrpol-linux-arm64
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            artifact: mehrpol-darwin-amd64
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            artifact: mehrpol-darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist
          go build -trimpath \
            -ldflags "-s -w -X github.com/matinsenpai/mehrpol/pkg/version.Version=${VERSION} -X github.com/matinsenpai/mehrpol/pkg/version.Commit=${COMMIT} -X github.com/matinsenpai/mehrpol/pkg/version.BuildDate=${BUILD_DATE} -X github.com/matinsenpai/mehrpol/pkg/version.BuiltBy=github-actions" \
            -o "dist/${{ matrix.artifact }}" \
            ./cmd/mehrpol

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "platform-tools" \
            "ndk;28.2.13676358"

      - name: Build Go mobile AAR
        run: |
          set -euo pipefail
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH="${PATH}:$(go env GOPATH)/bin"
          gomobile init
          bash ./android/build_go_mobile.sh

      - name: Prepare Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p android/keystore
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > android/keystore/release.keystore
          else
            keytool -genkeypair \
              -v \
              -keystore android/keystore/release.keystore \
              -storepass android \
              -keypass android \
              -alias release \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=mehrpol CI,O=mehrpol,C=US"
          fi

      - name: Derive Android version
        run: |
          set -euo pipefail
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          VERSION_CORE="${VERSION_NAME%%[-+]*}"
          IFS='.' read -r MAJOR MINOR PATCH REST <<< "${VERSION_CORE}"
          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          if [[ "${MAJOR}" =~ ^[0-9]+$ && "${MINOR}" =~ ^[0-9]+$ && "${PATCH}" =~ ^[0-9]+$ ]]; then
            VERSION_CODE=$((10#${MAJOR} * 10000 + 10#${MINOR} * 100 + 10#${PATCH}))
          else
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi
          if [ "${VERSION_CODE}" -le 0 ]; then
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          fi
          echo "ANDROID_VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"
          echo "ANDROID_VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"

      - name: Build release APKs
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
          ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
        run: |
          set -euo pipefail
          export ORG_GRADLE_PROJECT_KEYSTORE_PASSWORD="${ANDROID_KEYSTORE_PASSWORD:-android}"
          export ORG_GRADLE_PROJECT_KEY_ALIAS="${ANDROID_KEY_ALIAS:-release}"
          export ORG_GRADLE_PROJECT_KEY_PASSWORD="${ANDROID_KEY_PASSWORD:-android}"
          bash gradlew :app:assembleRelease --stacktrace

      - name: Prepare APK artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          VERSION="${ANDROID_VERSION_NAME}"
          for apk in android/app/build/outputs/apk/release/*.apk; do
            filename="$(basename "${apk}")"
            case "${filename}" in
              app-universal-release.apk) suffix="universal" ;;
              app-arm64-v8a-release.apk) suffix="arm64-v8a" ;;
              app-armeabi-v7a-release.apk) suffix="armeabi-v7a" ;;
              *) suffix="${filename#app-}"; suffix="${suffix%-release.apk}" ;;
            esac
            cp "${apk}" "dist/mehrpol-${VERSION}-${suffix}-release.apk"
          done
          ls -la dist

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mehrpol-android-apks
          path: dist/*.apk
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-go
      - build-android

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release artifacts
        run: ls -la release-artifacts

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
